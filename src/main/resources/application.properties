# Configuración del servidor
server.port=8082

# Conexión local a PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/rotary_db
spring.datasource.username=postgres
spring.datasource.password=admin1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# No hace falta definir dialect manualmente en PostgreSQL actual
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desactivar reinicio automático de DevTools
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Seguridad temporal para que OAuth2 no falle al arrancar
spring.security.oauth2.client.registration.github.client-id=fake
spring.security.oauth2.client.registration.github.client-secret=fake


jwt.secret=1PRL055tkkPgQUUnaxyVAHUA6QJXT4IJ
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# MinIO
minio.endpoint=http://127.0.0.1:9000
minio.access-key=minio
minio.secret-key=minio1234
minio.bucket-name=rotary-files

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu-correo@gmail.com
spring.mail.password=tu-contrasena-de-aplicacion
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true