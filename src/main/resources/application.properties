# Configuración del Servidor
server.port=8082

# Conexión Local Real
spring.datasource.url=jdbc:postgresql://localhost:5433/rotary_db
spring.datasource.username=postgres
spring.datasource.password=admin1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate: Magia para crear tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Seguridad temporal (para que no de error al arrancar)
spring.security.oauth2.client.registration.github.client-id=fake
spring.security.oauth2.client.registration.github.client-secret=fake

cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Configuración de MinIO (Valores temporales para local)
minio.endpoint=http://127.0.0.1:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket-name=rotary-files

# Configuración mínima de Email (aunque no lo uses hoy)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu-correo@gmail.com
spring.mail.password=tu-contraseña-de-aplicacion
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true