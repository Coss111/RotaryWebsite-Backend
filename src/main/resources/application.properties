# Configuración del servidor
server.port=8082

# Conexión local a PostgreSQL 
spring.datasource.url=jdbc:postgresql://localhost:5433/rotary_db
spring.datasource.username=postgres
spring.datasource.password=admin1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# No hace falta definir dialect manualmente en PostgreSQL actual
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Para reiniciar la base de datos
# spring.jpa.hibernate.ddl-auto=create

# Desactivar reinicio automático de DevTools
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Seguridad temporal para que OAuth2 no falle al arrancar
spring.security.oauth2.client.registration.github.client-id=fake
spring.security.oauth2.client.registration.github.client-secret=fake

